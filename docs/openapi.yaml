openapi: "3.1.0"
info:
  title: UCM API
  version: "1.0.0"
  description: |
    United Care Mobility — Multi-tenant Medical Transportation Management System API.

    Manages fleets, drivers, patients, trips, clinics, billing, and dispatch across multiple cities.

    ## Authentication
    All protected endpoints require a Bearer JWT token obtained via `POST /api/auth/login-jwt`.
    Include the token in the `Authorization` header: `Authorization: Bearer <token>`.

    ## Multi-Tenancy
    The JWT payload includes `companyId` for automatic tenant isolation. All data queries
    are scoped to the authenticated user's company. SUPER_ADMIN users can access data across companies
    by setting the `x-company-id` header.

    ## Roles
    - **SUPER_ADMIN** — Platform-wide access
    - **ADMIN** / **COMPANY_ADMIN** — Company-level administration
    - **DISPATCH** — Trip and driver management
    - **DRIVER** — Driver portal access
    - **VIEWER** — Read-only company access
    - **CLINIC_ADMIN** / **CLINIC_USER** / **CLINIC_VIEWER** — Clinic portal access

    ## Subscription Enforcement
    Companies with `subscription_enabled = true` are subject to subscription status checks
    and quota enforcement. Inactive subscriptions return `SUBSCRIPTION_INACTIVE` (403).
    Quota violations return `QUOTA_EXCEEDED` (403).
  contact:
    name: UCM Engineering
  license:
    name: MIT

servers:
  - url: "{protocol}://{host}"
    description: UCM API Server
    variables:
      protocol:
        default: https
        enum: [https, http]
      host:
        default: app.unitedcaremobility.com

tags:
  - name: Auth
    description: Authentication and session management
  - name: Trips
    description: Trip lifecycle management — create, assign, status transitions, signatures, PDFs
  - name: Drivers
    description: Driver management, profiles, and location tracking
  - name: Clinics
    description: Clinic management and clinic portal
  - name: Patients
    description: Patient records management
  - name: Vehicles
    description: Vehicle fleet management
  - name: Billing
    description: Invoicing, billing cycles, and payment operations
  - name: Admin
    description: Administrative operations — archive, restore, delete, system health
  - name: Subscriptions
    description: SaaS subscription and quota management
  - name: Onboarding
    description: Self-service tenant onboarding — company signup, trial activation, Stripe Connect
  - name: Webhooks
    description: Webhook endpoint management — subscribe to UCM events for external integrations
  - name: Health
    description: System health, readiness, and version checks

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT authentication token. Obtain via `POST /api/auth/login-jwt`.
        The JWT payload includes `companyId` for tenant scoping.

  schemas:
    WebhookResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        secret:
          type: string
          description: HMAC SHA256 signing secret (only returned on creation)
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    WebhookListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    WebhookPayload:
      type: object
      description: Payload delivered to webhook endpoints
      properties:
        event:
          type: string
          description: "Event name (e.g., trip.created)"
        timestamp:
          type: string
          format: date-time
        data:
          type: object
          description: Event-specific data

    Error:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code
      required: [message]

    SubscriptionInactiveError:
      type: object
      properties:
        message:
          type: string
          example: Subscription is not active
        code:
          type: string
          example: SUBSCRIPTION_INACTIVE
        companyId:
          type: integer
          example: 1
        status:
          type: string
          example: canceled
        graceDaysRemaining:
          type: integer
          example: 0
      required: [message, code, companyId, status]

    QuotaExceededError:
      type: object
      properties:
        message:
          type: string
          example: Driver quota exceeded
        code:
          type: string
          example: QUOTA_EXCEEDED
        companyId:
          type: integer
          example: 1
        limitName:
          type: string
          example: max_drivers
        currentUsage:
          type: integer
          example: 50
        limitValue:
          type: integer
          example: 50
      required: [message, code, companyId, limitName, currentUsage, limitValue]

    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: admin@ucm.com
        password:
          type: string
          example: password123
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token
        user:
          type: object
          properties:
            id:
              type: integer
            username:
              type: string
            role:
              type: string
            companyId:
              type: integer
              nullable: true

    Trip:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        patientId:
          type: integer
        driverId:
          type: integer
          nullable: true
        clinicId:
          type: integer
          nullable: true
        cityId:
          type: integer
        status:
          type: string
          enum:
            - SCHEDULED
            - ASSIGNED
            - EN_ROUTE_TO_PICKUP
            - ARRIVED_PICKUP
            - IN_TRANSIT
            - ARRIVED_DESTINATION
            - COMPLETED
            - CANCELLED
            - NO_SHOW
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        scheduledPickupTime:
          type: string
          format: date-time
        tripType:
          type: string
          enum: [ONE_WAY, ROUND_TRIP, WAIT_AND_RETURN]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TripCreateRequest:
      type: object
      properties:
        patientId:
          type: integer
          example: 42
        clinicId:
          type: integer
          example: 5
        cityId:
          type: integer
          example: 1
        pickupAddress:
          type: string
          example: "123 Main St, Washington, DC 20001"
        dropoffAddress:
          type: string
          example: "456 Hospital Ave, Washington, DC 20010"
        scheduledPickupTime:
          type: string
          format: date-time
          example: "2026-03-10T09:00:00Z"
        tripType:
          type: string
          enum: [ONE_WAY, ROUND_TRIP, WAIT_AND_RETURN]
          example: ONE_WAY
        notes:
          type: string
          example: "Patient requires wheelchair accessible vehicle"
      required: [patientId, cityId, pickupAddress, dropoffAddress, scheduledPickupTime]

    Driver:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        userId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
        vehicleId:
          type: integer
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        createdAt:
          type: string
          format: date-time

    DriverLocationUpdate:
      type: object
      properties:
        latitude:
          type: number
          format: double
          example: 38.8977
        longitude:
          type: number
          format: double
          example: -77.0365
        heading:
          type: number
          format: double
          example: 180.0
        speed:
          type: number
          format: double
          example: 35.5
        accuracy:
          type: number
          format: double
          example: 10.0
        timestamp:
          type: string
          format: date-time
      required: [latitude, longitude]

    Clinic:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        cityId:
          type: integer
        createdAt:
          type: string
          format: date-time

    Patient:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        dateOfBirth:
          type: string
          format: date
        clinicId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    Vehicle:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        licensePlate:
          type: string
        vin:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, MAINTENANCE]
        createdAt:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        clinicId:
          type: integer
          nullable: true
        tripId:
          type: integer
          nullable: true
        amountCents:
          type: integer
          description: Amount in cents (e.g., 5000 = $50.00)
        status:
          type: string
          enum: [DRAFT, SENT, PAID, OVERDUE, VOID]
        dueDate:
          type: string
          format: date
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

  responses:
    Unauthorized:
      description: Authentication required — missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Unauthorized

    Forbidden:
      description: Insufficient permissions for this operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Forbidden

    SubscriptionInactive:
      description: Company subscription is not active (SUBSCRIPTION_INACTIVE)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubscriptionInactiveError"

    QuotaExceeded:
      description: Resource quota exceeded for company (QUOTA_EXCEEDED)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/QuotaExceededError"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Not found

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: "Validation error: pickupAddress is required"

paths:
  # ──────────────────────────── Health ────────────────────────────
  /api/healthz:
    get:
      tags: [Health]
      summary: Liveness probe with DB and Redis status
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  db:
                    type: string
                    example: ok
                  redis:
                    type: string
                    example: ok

  /api/readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: Service is ready to accept traffic
        "503":
          description: Service is not ready

  /api/version:
    get:
      tags: [Health]
      summary: Application version and build info
      security: []
      responses:
        "200":
          description: Version information
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  environment:
                    type: string
                  runMode:
                    type: string

  # ──────────────────────────── Auth ────────────────────────────
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with username and password (session-based)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
        "429":
          description: Rate limit exceeded

  /api/auth/login-jwt:
    post:
      tags: [Auth]
      summary: Login and receive a JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
        "429":
          description: Rate limit exceeded

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  role:
                    type: string
                  companyId:
                    type: integer
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              required: [email]
      responses:
        "200":
          description: Reset email sent (always returns 200 to prevent enumeration)
        "429":
          description: Rate limit exceeded

  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password for authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
              required: [currentPassword, newPassword]
      responses:
        "200":
          description: Password changed successfully
        "400":
          description: Invalid current password
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/health:
    get:
      tags: [Auth]
      summary: Auth service health check
      security: []
      responses:
        "200":
          description: Auth service is healthy

  # ──────────────────────────── Trips ────────────────────────────
  /api/trips:
    get:
      tags: [Trips]
      summary: List trips
      description: Returns trips for the authenticated user's company. Supports filtering by status, date range, driver, clinic, and city.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [SCHEDULED, ASSIGNED, EN_ROUTE_TO_PICKUP, ARRIVED_PICKUP, IN_TRANSIT, ARRIVED_DESTINATION, COMPLETED, CANCELLED, NO_SHOW]
        - name: driverId
          in: query
          schema:
            type: integer
        - name: clinicId
          in: query
          schema:
            type: integer
        - name: cityId
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Trips]
      summary: Create a new trip
      description: |
        Creates a trip in SCHEDULED status. Subject to quota enforcement
        when subscription is active (`QUOTA_EXCEEDED` if max_active_trips is reached).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripCreateRequest"
            example:
              patientId: 42
              clinicId: 5
              cityId: 1
              pickupAddress: "123 Main St, Washington, DC 20001"
              dropoffAddress: "456 Hospital Ave, Washington, DC 20010"
              scheduledPickupTime: "2026-03-10T09:00:00Z"
              tripType: ONE_WAY
              notes: "Patient requires wheelchair accessible vehicle"
      responses:
        "201":
          description: Trip created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/SubscriptionInactive"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/trips/{id}:
    get:
      tags: [Trips]
      summary: Get trip details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Trips]
      summary: Update trip details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pickupAddress:
                  type: string
                dropoffAddress:
                  type: string
                scheduledPickupTime:
                  type: string
                  format: date-time
                driverId:
                  type: integer
                  nullable: true
                notes:
                  type: string
      responses:
        "200":
          description: Trip updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/trips/{id}/status:
    patch:
      tags: [Trips]
      summary: Transition trip status
      description: Advances the trip through its state machine. Only valid transitions are allowed.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  description: State machine event
                  enum:
                    - ASSIGN_DRIVER
                    - START_TO_PICKUP
                    - MARK_ARRIVED_PICKUP
                    - START_TRANSIT
                    - MARK_ARRIVED_DESTINATION
                    - COMPLETE
                    - CANCEL
                    - NO_SHOW
              required: [event]
      responses:
        "200":
          description: Status transitioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "400":
          description: Invalid transition
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/trips/{id}/cancel:
    post:
      tags: [Trips]
      summary: Cancel a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Trip cancelled
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/trips/{id}/pdf:
    get:
      tags: [Trips]
      summary: Download trip PDF
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF document
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/trips/{id}/signature/driver:
    post:
      tags: [Trips]
      summary: Upload driver signature for trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                signature:
                  type: string
                  description: Base64-encoded signature image
              required: [signature]
      responses:
        "200":
          description: Signature saved
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────── Drivers ────────────────────────────
  /api/drivers:
    get:
      tags: [Drivers]
      summary: List drivers
      description: Returns drivers for the authenticated user's company.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, SUSPENDED]
        - name: cityId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Drivers]
      summary: Create a new driver
      description: |
        Creates a driver and associated user account.
        Subject to quota enforcement (`QUOTA_EXCEEDED` if max_drivers is reached).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  example: John
                lastName:
                  type: string
                  example: Smith
                email:
                  type: string
                  format: email
                  example: john.smith@example.com
                phone:
                  type: string
                  example: "+12025551234"
                cityId:
                  type: integer
                  example: 1
              required: [firstName, lastName, email, phone, cityId]
      responses:
        "201":
          description: Driver created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/QuotaExceeded"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/drivers/{id}:
    get:
      tags: [Drivers]
      summary: Get driver details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Driver details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Drivers]
      summary: Update driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, SUSPENDED]
      responses:
        "200":
          description: Driver updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────── Clinics ────────────────────────────
  /api/clinics:
    get:
