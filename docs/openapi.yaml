  # ---------------------------------------------------------------------------
  # Self-Service Onboarding (PR9)
  # ---------------------------------------------------------------------------

  /api/signup/company:
    post:
      tags: [Onboarding]
      summary: Register a new company (self-service signup)
      description: |
        Public endpoint — no authentication required, rate-limited to 5 requests/hour per IP.

        Creates a new company, admin user (COMPANY_ADMIN), trial subscription (14 days),
        default settings, and onboarding state. Returns a JWT for immediate login.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                companyName:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: Acme Medical Transport
                adminEmail:
                  type: string
                  format: email
                  maxLength: 255
                  example: admin@acme-transport.com
                adminPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
                  example: secureP@ssw0rd
                city:
                  type: string
                  maxLength: 100
                  example: New York
                timezone:
                  type: string
                  maxLength: 50
                  example: America/New_York
              required: [companyName, adminEmail, adminPassword]
      responses:
        "201":
          description: Company created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  company:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      role:
                        type: string
                        example: COMPANY_ADMIN
                  subscription:
                    type: object
                    properties:
                      status:
                        type: string
                        example: trialing
                      trialEndsAt:
                        type: string
                        format: date-time
                  onboarding:
                    type: object
                    properties:
                      company_created:
                        type: boolean
                      stripe_connected:
                        type: boolean
                      first_driver_added:
                        type: boolean
                      first_trip_created:
                        type: boolean
                  token:
                    type: string
                    description: JWT access token for immediate login
        "400":
          description: Invalid signup data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Duplicate email or company name
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  code:
                    type: string
                    enum: [EMAIL_EXISTS, COMPANY_EXISTS]
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  retryAfterMs:
                    type: integer

  /api/signup/stripe-connect:
    post:
      tags: [Onboarding]
      summary: Generate Stripe Connect onboarding link
      description: |
        Authenticated endpoint. Creates a Stripe Express account for the company
        (if one doesn't exist) and returns an onboarding URL. Only the company's
        own COMPANY_ADMIN or a SUPER_ADMIN can call this.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                companyId:
                  type: integer
                  example: 42
              required: [companyId]
      responses:
        "200":
          description: Stripe onboarding URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                    example: https://connect.stripe.com/setup/s/...
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Stripe not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/signup/onboarding-state:
    get:
      tags: [Onboarding]
      summary: Get onboarding progress for the authenticated company
      description: |
        Returns the setup wizard state showing which onboarding steps
        have been completed. Requires authentication.
      responses:
        "200":
          description: Onboarding state
          content:
            application/json:
              schema:
                type: object
                properties:
                  companyId:
                    type: integer
                  steps:
                    type: object
                    properties:
                      company_created:
                        type: boolean
                      stripe_connected:
                        type: boolean
                      first_driver_added:
                        type: boolean
                      first_trip_created:
                        type: boolean
                  completedAt:
                    type: string
                    format: date-time
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No onboarding state found

  /api/webhooks:
    post:
      tags: [Webhooks]
      summary: Create webhook endpoint
      description: Register a new webhook endpoint for the authenticated company. Returns the webhook secret (only shown once).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                  description: HTTPS endpoint URL to receive webhook payloads
                events:
                  type: array
                  items:
                    type: string
                    enum:
                      - trip.created
                      - trip.assigned
                      - trip.started
                      - trip.completed
                      - trip.cancelled
                      - driver.location_updated
                      - invoice.created
                      - invoice.paid
                      - subscription.updated
                  description: List of events to subscribe to
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "400":
          description: Invalid input
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: COMPANY_ADMIN role required

    get:
      tags: [Webhooks]
      summary: List company webhooks
      description: List all webhook endpoints for the authenticated company. Secrets are not included.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: COMPANY_ADMIN role required

  /api/webhooks/{id}:
    patch:
      tags: [Webhooks]
      summary: Update webhook
      description: Update a webhook endpoint's URL, events, or active status.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                    enum:
                      - trip.created
                      - trip.assigned
                      - trip.started
                      - trip.completed
                      - trip.cancelled
                      - driver.location_updated
                      - invoice.created
                      - invoice.paid
                      - subscription.updated
                active:
                  type: boolean
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListItem"
        "400":
          description: Invalid input
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Webhook not found

    delete:
      tags: [Webhooks]
      summary: Deactivate webhook
      description: Soft-delete a webhook by setting active to false.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Webhook not found
