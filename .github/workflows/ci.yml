name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ucm_test
          POSTGRES_USER: ucm
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ucm:testpassword@localhost:5432/ucm_test
      REDIS_URL: redis://localhost:6379
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      JWT_SECRET: test-jwt-secret-must-be-at-least-32-characters-long
      CSRF_SECRET: test-csrf-secret-must-be-at-least-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npx vitest run --config vitest.config.ts

      - name: Run DB migrations
        run: npx drizzle-kit push --force
        env:
          DATABASE_URL: postgresql://ucm:testpassword@localhost:5432/ucm_test

      - name: Run integration tests
        run: npx vitest run --config vitest.integration.config.ts

      - name: Build
        run: npx tsc
