name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist output
        run: |
          test -f dist/index.cjs || (echo "ERROR: dist/index.cjs not found" && exit 1)
          test -d dist/public || (echo "ERROR: dist/public not found" && exit 1)
          echo "Build artifacts verified"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ucm:ci .
      - name: Smoke test container
        run: |
          docker run -d --name ucm-smoke -p 5000:5000 \
            -e NODE_ENV=production \
            -e RUN_MODE=api \
            ucm:ci
          sleep 5
          curl -sf http://localhost:5000/health | grep '"status":"alive"' || (docker logs ucm-smoke && exit 1)
          docker stop ucm-smoke
