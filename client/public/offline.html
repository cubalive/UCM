<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - United Care Mobility</title>
  <meta name="theme-color" content="#0B2A4A" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1e3d;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 20px;
      overflow: hidden;
    }
    .icon img { width: 100%; height: 100%; object-fit: cover; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #fff; }
    p { font-size: 0.95rem; line-height: 1.5; color: #94a3b8; margin-bottom: 1.5rem; }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <img src="/branding/icon-96.png" alt="UCM" />
    </div>
    <h1>You're Offline</h1>
    <p>United Care Mobility requires an internet connection. Please check your network and try again.</p>
    <div id="queue-status" style="display:none; margin-bottom:1.25rem; background:#1e293b; padding:0.75rem 1rem; border-radius:8px; font-size:0.85rem;">
      <span style="color:#fbbf24;">Pending updates:</span>
      <span id="queue-count" style="color:#fff; font-weight:600;">0</span>
      <p style="color:#64748b; font-size:0.75rem; margin-top:0.25rem;">These will sync automatically when you reconnect.</p>
    </div>
    <button onclick="window.location.reload()">Retry</button>
  </div>
  <script>
    (function() {
      try {
        var req = indexedDB.open("ucm-offline-queue", 1);
        req.onsuccess = function() {
          var db = req.result;
          if (!db.objectStoreNames.contains("queue")) { db.close(); return; }
          var tx = db.transaction("queue", "readonly");
          var store = tx.objectStore("queue");
          var countReq = store.count();
          countReq.onsuccess = function() {
            if (countReq.result > 0) {
              document.getElementById("queue-status").style.display = "block";
              document.getElementById("queue-count").textContent = countReq.result;
            }
          };
          tx.oncomplete = function() { db.close(); };
        };
      } catch(e) {}
    })();
  </script>
</body>
</html>
