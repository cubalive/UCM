<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a1e3d">
  <title>UCM Clinic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1e3d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 13px; color: #64748b; text-align: center; }
    .offline-msg {
      display: none;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px;
      padding: 16px;
      margin-top: 24px;
      text-align: center;
      max-width: 300px;
    }
    .offline-msg h3 { font-size: 15px; color: #fca5a5; margin-bottom: 6px; }
    .offline-msg p { font-size: 13px; color: #94a3b8; }
    .retry-btn {
      margin-top: 12px;
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .retry-btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <h1>UCM Clinic</h1>
  <p class="subtitle">United Care Mobility</p>
  <p class="status" id="status">Loading application...</p>

  <div class="offline-msg" id="offline">
    <h3>No Internet Connection</h3>
    <p>Please check your network connection and try again.</p>
    <button class="retry-btn" onclick="location.reload()">Retry</button>
  </div>

  <script>
    var SERVER = 'https://clinic.unitedcaremobility.com';
    var CHECK_INTERVAL = 3000;
    var MAX_RETRIES = 10;
    var retries = 0;

    function checkAndRedirect() {
      if (!navigator.onLine) { showOffline(); return; }
      fetch(SERVER + '/api/boot', { method: 'GET', cache: 'no-store' })
        .then(function(r) { if (r.ok) window.location.replace(SERVER); else retry(); })
        .catch(function() { retry(); });
    }

    function showOffline() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      document.getElementById('offline').style.display = 'block';
    }

    function retry() {
      retries++;
      if (retries >= MAX_RETRIES) { showOffline(); return; }
      document.getElementById('status').textContent = 'Connecting... (' + retries + '/' + MAX_RETRIES + ')';
      setTimeout(checkAndRedirect, CHECK_INTERVAL);
    }

    window.addEventListener('online', function() { retries = 0; location.reload(); });
    window.addEventListener('offline', showOffline);
    checkAndRedirect();
  </script>
</body>
</html>
