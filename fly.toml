app = "ucm-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "node dist/index.cjs"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/api/boot"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  RUN_MODE = "all"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
