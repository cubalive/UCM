[build]
  dockerfile = "Dockerfile"

app = "ucm-api"
primary_region = "iad"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [http_service.checks.health]
      interval = "15s"
      timeout = "5s"
      grace_period = "120s"
      method = "GET"
      path = "/api/boot"

[processes]
  app = "node dist/index.cjs"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  RUN_MODE = "all"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
